# ─────────────────────────────────────────────
# application-dev.yml  —  local / development
# ─────────────────────────────────────────────

spring:
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      exclude: static/**,public/**
    livereload:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DEV_DB_HOST}:${DEV_DB_PORT}/${DEV_DB_NAME}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}    # MUST come from env
    hikari:
      maximum-pool-size: 10          # Increased from 5 (healthcare needs more)
      leak-detection-threshold: 3000 # Catch leaks faster
      minimum-idle: 2

      # ⭐ NEW: H2 for integration testing (optional)
      # Uncomment for unit tests:
      # datasource:
      #   url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
      #   driver-class-name: org.h2.Driver

  jpa:
    show-sql: true                    # OK in dev
    hibernate:
      ddl-auto: validate              # ✅ Keep validate, not update
    properties:
      hibernate:
        generate_statistics: true
        jdbc.batch_size: 50           # Smaller batch for dev
        format_sql: true
        use_sql_comments: true

  cache:
    type: redis
    redis:
      time-to-live: 300000            # 5 min in dev

  data:
    redis:
      host: ${DEV_REDIS_HOST}
      port: ${DEV_REDIS_PORT}
      password: ${DEV_REDIS_PASSWORD}

  kafka:
    bootstrap-servers: ${DEV_KAFKA_SERVERS}
    consumer:
      auto-offset-reset: earliest

server:
  port: 8081                          # Different from prod default
  error:
    include-message: always
    include-stacktrace: always
    include-binding-errors: always
  tomcat:
    accesslog:
      enabled: true
      pattern: '%h %l %u %t "%r" %s %b'

management:
  endpoints:
    web:
      exposure:
        include: "*"                  # Dev only - all endpoints
  endpoint:
    health:
      show-details: always
    loggers:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    root: INFO
    com.healthcare: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.data.redis: DEBUG
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ⭐ Dev-specific: Mock external services
healthcare:
  external:
    mock-email: true
    mock-sms: true
    mock-fhir: true

# JWT - Dev key (different from prod)
app:
  jwt:
    secret: ${DEV_JWT_SECRET}
    expiration-time: ${DEV_JWT_EXPIRATION}

# ⚠️ REMOVED hardcoded mail, spaces, audit configs
# These should NEVER be in YAML files
# Use Spring Cloud Config + Vault instead
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Page Studio | Healthcare System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --accent: #8b5cf6;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #e6edf3;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            resize: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            text-align: center;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        #configDisplay {
            height: 500px;
        }

        .field-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
        }

        .field-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .field-info h4 {
            color: var(--primary);
            font-size: 1rem;
        }

        .field-info span {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .field-toggles {
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
        }

        .toggle-btn.active {
            background: var(--primary);
            color: var(--bg-dark);
            border-color: var(--primary);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(56, 189, 248, 0.2);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header>
            <h1>Master Page Studio</h1>
            <p>Generate production-ready healthcare modules from SQL schema</p>
        </header>

        <div class="grid">
            <div class="glass-card">
                <label>Step 1: Paste SQL DDL</label>
                <textarea id="sqlInput" placeholder="CREATE TABLE mst_example (
    id BIGINT PRIMARY KEY,
    name VARCHAR(255) NOT NULL,
    code VARCHAR(50) UNIQUE,
    ...
);"></textarea>
                <div class="controls">
                    <button class="btn btn-primary" onclick="parseSql()">Parse Schema</button>
                    <button class="btn btn-outline" onclick="clearAll()">Clear</button>
                </div>
            </div>

            <div class="glass-card">
                <label>Step 2: Review & Customize</label>
                <div id="moduleMeta" style="display: none; margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label style="font-size: 0.7rem;">Module Name</label>
                            <input type="text" id="moduleName" style="width:100%; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: white;">
                        </div>
                        <div>
                            <label style="font-size: 0.7rem;">Package Path</label>
                            <input type="text" id="packagePath" style="width:100%; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: white;">
                        </div>
                    </div>
                    
                    <div class="field-list" id="fieldList">
                        <!-- Dynamic Fields -->
                    </div>
                </div>
                <div id="noData" style="text-align: center; padding: 100px 0; color: var(--text-dim);">
                    Parse a schema first to see options...
                </div>
                
                <div class="controls" id="actionButtons" style="display: none;">
                    <button class="btn btn-primary" style="width: 100%; background: var(--success); color: white;" onclick="downloadZip()">Download Generated ZIP</button>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <label>Raw JSON Configuration (Live Preview)</label>
            <textarea id="jsonPreview" style="height: 300px;" readonly></textarea>
        </div>
    </div>

    <script>
        let currentConfig = null;

        async function parseSql() {
            const sql = document.getElementById('sqlInput').value.trim();
            if (!sql) return alert('Please enter SQL schema');

            showLoader(true);
            try {
                const response = await fetch('/api/v2/generator/parse-sql', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: sql
                });

                if (!response.ok) throw new Error('Parsing failed');

                currentConfig = await response.json();
                renderUI();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                showLoader(false);
            }
        }

        function renderUI() {
            if (!currentConfig) return;

            document.getElementById('noData').style.display = 'none';
            document.getElementById('moduleMeta').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'flex';

            document.getElementById('moduleName').value = currentConfig.moduleName;
            document.getElementById('packagePath').value = currentConfig.packageName;

            const fieldList = document.getElementById('fieldList');
            fieldList.innerHTML = '';

            currentConfig.fields.forEach((field, index) => {
                const item = document.createElement('div');
                item.className = 'field-item';
                item.innerHTML = `
                    <div class="field-info">
                        <h4>${field.name}</h4>
                        <span>${field.columnName} (${field.type})</span>
                    </div>
                    <div class="field-toggles">
                        <button class="toggle-btn ${field.searchable ? 'active' : ''}" onclick="toggleField(${index}, 'searchable')">Search</button>
                        <button class="toggle-btn ${field.filterable ? 'active' : ''}" onclick="toggleField(${index}, 'filterable')">Filter</button>
                        <button class="toggle-btn ${field.sortable ? 'active' : ''}" onclick="toggleField(${index}, 'sortable')">Sort</button>
                    </div>
                `;
                fieldList.appendChild(item);
            });

            updateJsonPreview();
        }

        function toggleField(index, prop) {
            currentConfig.fields[index][prop] = !currentConfig.fields[index][prop];
            renderUI();
        }

        function updateJsonPreview() {
            // Update config from inputs
            currentConfig.moduleName = document.getElementById('moduleName').value;
            currentConfig.packageName = document.getElementById('packagePath').value;
            
            document.getElementById('jsonPreview').value = JSON.stringify(currentConfig, null, 2);
        }

        async function downloadZip() {
            updateJsonPreview();
            showLoader(true);
            try {
                const response = await fetch('/api/v2/generator/generate/zip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentConfig)
                });

                if (!response.ok) throw new Error('Generation failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${currentConfig.moduleName}-code.zip`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                showLoader(false);
            }
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        function clearAll() {
            document.getElementById('sqlInput').value = '';
            document.getElementById('jsonPreview').value = '';
            document.getElementById('noData').style.display = 'block';
            document.getElementById('moduleMeta').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            currentConfig = null;
        }

        // Live update listeners
        document.getElementById('moduleName').addEventListener('input', updateJsonPreview);
        document.getElementById('packagePath').addEventListener('input', updateJsonPreview);
    </script>
</body>
</html>

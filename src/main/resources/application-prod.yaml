# ─────────────────────────────────────────────
# application-prod.yml  —  production
# Secrets via env vars — never hardcode here!
# ─────────────────────────────────────────────

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 20
      maximum-pool-size: 100           # Increased for healthcare
      connection-timeout: 3000
      validation-timeout: 2000
      ssl: true

  datasource-replica:
    url: ${DB_REPLICA_URL}
    username: ${DB_REPLICA_USERNAME}
    password: ${DB_REPLICA_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate                # ✅ Must be validate
    properties:
      hibernate:
        jdbc.batch_size: 100
        generate_statistics: false

  cache:
    type: redis
    redis:
      time-to-live: 600000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl: true

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}
    producer:
      compression-type: snappy

  flyway:
    enabled: true
    out-of-order: false
    validate-on-migrate: true
    clean-disabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/postgresql

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
  tomcat:
    accesslog:
      enabled: true
      directory: /var/log/tomcat
      prefix: access_log
      suffix: .log
      pattern: '%h %l %u %t "%r" %s %b %D'  # %D = response time

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: WARN
    com.healthcare: INFO
    org.hibernate: WARN
  file:
    name: /var/log/healthcare/app.log
    max-size: 500MB
    max-history: 30
  logback:
    rollingpolicy:
      max-file-size: 500MB
      max-history: 60
      total-size-cap: 10GB

# External service endpoints (no secrets!)
healthcare:
  external:
    fhir-server-url: ${FHIR_SERVER_URL}
    notification-service-url: ${NOTIFICATION_SERVICE_URL}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-time: ${JWT_EXPIRATION}